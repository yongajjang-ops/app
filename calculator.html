<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>계산기</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .calculator {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 350px;
            overflow: hidden;
        }

        .display {
            background: #f4f4f4;
            padding: 20px;
            text-align: right;
            font-size: 2.5rem;
            font-weight: bold;
            min-height: 80px;
            width: 100%;
            border: none;
            border-bottom: 1px solid #e0e0e0;
            outline: none;
            font-family: 'Arial', sans-serif;
        }

        .display:focus {
            background: #fff;
            box-shadow: inset 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .history-section {
            background: #fafafa;
            border-bottom: 1px solid #e0e0e0;
        }

        .history-label {
            font-size: 0.8rem;
            color: #666;
            padding: 8px 15px 5px;
        }

        .history-list {
            max-height: 150px;
            overflow-y: auto;
        }

        .history-item {
            padding: 8px 15px;
            font-size: 0.95rem;
            color: #333;
            text-align: right;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid #eee;
        }

        .history-item:hover, .history-item:active {
            background: #e8e8e8;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: #e0e0e0;
        }

        .btn {
            background: #fff;
            border: none;
            padding: 25px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.1s;
            user-select: none;
        }

        .btn:active {
            background: #d0d0d0;
        }

        .btn.operator {
            background: #ff9800;
            color: #fff;
        }

        .btn.operator:active {
            background: #e68900;
        }

        .btn.clear {
            background: #ff5c5c;
            color: #fff;
        }

        .btn.clear:active {
            background: #e04545;
        }

        .btn.backspace {
            background: #ff8a80;
            color: #fff;
        }

        .btn.backspace:active {
            background: #e57373;
        }

        .btn.equals {
            background: #4caf50;
            color: #fff;
        }

        .btn.equals:active {
            background: #3d9140;
        }

        .btn.number {
            background: #fafafa;
            color: #333;
        }

        .btn.number:active {
            background: #e0e0e0;
        }

        /* 스크롤바 스타일 */
        .history-list::-webkit-scrollbar {
            width: 5px;
        }

        .history-list::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" class="display" id="display" value="0" inputmode="none">

        <div class="history-section">
            <div class="history-label">계산 내역 (터치하여 수정)</div>
            <div class="history-list" id="historyList"></div>
        </div>

        <div class="buttons">
            <button class="btn number" data-value="7">7</button>
            <button class="btn number" data-value="8">8</button>
            <button class="btn number" data-value="9">9</button>
            <button class="btn operator" data-value="/">/</button>

            <button class="btn number" data-value="4">4</button>
            <button class="btn number" data-value="5">5</button>
            <button class="btn number" data-value="6">6</button>
            <button class="btn operator" data-value="*">*</button>

            <button class="btn number" data-value="1">1</button>
            <button class="btn number" data-value="2">2</button>
            <button class="btn number" data-value="3">3</button>
            <button class="btn operator" data-value="-">-</button>

            <button class="btn clear" data-value="C">C</button>
            <button class="btn number" data-value="0">0</button>
            <button class="btn backspace" data-value="backspace">&#9003;</button>
            <button class="btn operator" data-value="+">+</button>

            <button class="btn number" data-value=".">.</button>
            <button class="btn equals" data-value="=" style="grid-column: span 3">=</button>
        </div>
    </div>

    <script>
        class Calculator {
            constructor() {
                this.expression = '';
                this.history = [];
                this.display = document.getElementById('display');
                this.historyList = document.getElementById('historyList');

                this.init();
            }

            init() {
                // 버튼 이벤트 바인딩
                document.querySelectorAll('.btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.onButtonClick(btn.dataset.value);
                    });
                });

                // 입력창 직접 수정 이벤트
                this.display.addEventListener('input', () => {
                    // 쉼표 제거하고 expression에 저장
                    this.expression = this.removeCommas(this.display.value);
                });

                // 입력창에서 Enter 키 처리
                this.display.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        this.calculate();
                    }
                });

                // 키보드 이벤트 (입력창 외부)
                document.addEventListener('keydown', (e) => {
                    // 입력창에 포커스가 있으면 무시 (직접 입력 허용)
                    if (document.activeElement === this.display) {
                        return;
                    }

                    if (e.key >= '0' && e.key <= '9') {
                        this.onButtonClick(e.key);
                    } else if (['+', '-', '*', '/', '.'].includes(e.key)) {
                        this.onButtonClick(e.key);
                    } else if (e.key === 'Enter' || e.key === '=') {
                        this.onButtonClick('=');
                    } else if (e.key === 'Escape' || e.key === 'c' || e.key === 'C') {
                        this.onButtonClick('C');
                    } else if (e.key === 'Backspace') {
                        this.onButtonClick('backspace');
                    }
                });
            }

            formatNumber(numStr) {
                try {
                    if (numStr.includes('.')) {
                        const [intPart, decPart] = numStr.split('.');
                        return parseInt(intPart).toLocaleString() + '.' + decPart;
                    }
                    return parseInt(numStr).toLocaleString();
                } catch {
                    return numStr;
                }
            }

            formatExpression(expr) {
                return expr.replace(/\d+\.?\d*/g, (match) => this.formatNumber(match));
            }

            removeCommas(expr) {
                return expr.replace(/,/g, '');
            }

            onButtonClick(value) {
                if (value === 'C') {
                    this.expression = '';
                    this.updateDisplay();
                } else if (value === 'backspace') {
                    this.expression = this.expression.slice(0, -1);
                    this.updateDisplay();
                } else if (value === '=') {
                    this.calculate();
                } else {
                    this.expression += value;
                    this.updateDisplay();
                }
            }

            calculate() {
                // 입력창에서 직접 값을 가져옴 (사용자가 수정했을 수 있음)
                const currentValue = this.display.value;
                if (!currentValue || currentValue === '0') return;

                try {
                    const calcExpr = this.removeCommas(currentValue);
                    const result = eval(calcExpr);

                    if (result === Infinity || result === -Infinity) {
                        alert('0으로 나눌 수 없습니다.');
                        this.expression = '';
                        this.updateDisplay();
                        return;
                    }

                    const resultStr = String(result);
                    const formattedExpr = this.formatExpression(calcExpr);
                    const formattedResult = this.formatNumber(resultStr);
                    const historyEntry = `${formattedExpr} = ${formattedResult}`;

                    this.addToHistory(historyEntry);
                    this.expression = '';
                    this.updateDisplay();
                } catch {
                    alert('잘못된 수식입니다.');
                    this.expression = '';
                    this.updateDisplay();
                }
            }

            updateDisplay() {
                if (this.expression === '') {
                    this.display.value = '0';
                } else {
                    this.display.value = this.formatExpression(this.expression);
                }
            }

            addToHistory(entry) {
                this.history.unshift(entry);
                if (this.history.length > 5) {
                    this.history.pop();
                }
                this.updateHistoryDisplay();
            }

            updateHistoryDisplay() {
                this.historyList.innerHTML = '';
                this.history.forEach((entry, index) => {
                    const item = document.createElement('div');
                    item.className = 'history-item';
                    item.textContent = entry;
                    item.addEventListener('click', () => this.onHistorySelect(index));
                    this.historyList.appendChild(item);
                });
            }

            onHistorySelect(index) {
                const entry = this.history[index];
                const exprPart = entry.split(' = ')[0];
                this.expression = this.removeCommas(exprPart);
                this.updateDisplay();
                // 입력창에 포커스를 주어 바로 수정 가능하게
                this.display.focus();
                // 커서를 끝으로 이동
                this.display.setSelectionRange(this.display.value.length, this.display.value.length);
            }
        }

        // 앱 시작
        new Calculator();
    </script>
</body>
</html>
